apiVersion: apps/v1
kind: Deployment
metadata:
name: helpdesk-v3
spec:
replicas: 1
selector:
matchLabels:
app: helpdesk-v3
template:
metadata:
labels:
app: helpdesk-v3
spec:
containers:
- name: helpdesk
image: nisha1114/helpdesk-app:v3
ports:
- containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
name: helpdesk-service-v3
spec:
type: NodePort
selector:
app: helpdesk-v3
ports:
- port: 80
targetPort: 8080
nodePort: 30003
