apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-v1

spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-v1

  template:
    metadata:
      labels:
        app: chat-v1
    spec:
    containers:
      - name: chat
        image: 23mis0532/chat-app:v1
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: chat-service-v1

spec:
  type: NodePort
  selector:
    app: chat-v1
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30001