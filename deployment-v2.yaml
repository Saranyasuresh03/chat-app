apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-v2

spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-v2

  template:
    metadata:
      labels:
        app: chat-v2
    spec:
    containers:
      - name: chat
        image: 23mis0532/chat-app:v2
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: chat-service-v2

spec:
  type: NodePort
  selector:
    app: chat-v2
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30002